<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Earn Money India - Spin & Win</title>

<link rel="stylesheet" href="Style.css">

<!-- Google AdSense -->
<script async
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXX"
crossorigin="anonymous"></script>

</head>

<body>

<header>

<img src="Swilogo.png" width="200">

<h1>Spin & Win India 🇮🇳</h1>

<p>Play • Spin • Win Coins</p>

<button onclick="logout()" class="logout">
Logout
</button>

</header>

<!-- Balance Section -->

<div class="balance">

Coins: <span id="coins">0</span>

|

Wallet: ₹<span id="wallet">0</span>

</div>

<!-- Spin Game -->

<div class="container">

<div class="pointer">🔻</div>

<div id="wheel"></div>

<button id="spinBtn" onclick="spin()">🎯 SPIN</button>

</div>

<!-- Reward Ad -->

<div class="ad-box">

<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-XXXXXXXX"
data-ad-slot="1234567890"
data-ad-format="auto"
data-full-width-responsive="true">
</ins>

<script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>

</div>

<!-- Menu -->

<div class="menu">

<button onclick="dailyBonus()">
🎁 Daily Bonus
</button>

<button onclick="watchAdCoins()">📺 Watch Ad & Earn 20 Coins</button>

<button onclick="alert('Scratch Card coming soon')">
🎫 Scratch Card
</button>

<button onclick="alert('Lucky Number coming soon')">
🔢 Lucky Number
</button>

<button onclick="window.location.href='wallet.html'">
💰 Wallet
</button>

</div>

<!-- Popup -->

<div class="popup" id="popup">

<div class="popup-content">

<h2 id="resultText"></h2>

<button onclick="closePopup()">OK</button>

</div>

</div>
  <!-- ads section  -->
<div class="ad-popup" id="adPopup">
<div class="ad-box-inner">

<h2>📺 Watch Ad to Continue</h2>

<p id="adTimer">Ad loading...</p>

</div>
</div>
  
<!-- Scripts -->

<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="Script.js"></script>
<script type="module">
import { auth } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login.html";
}
});
  </script>

</body>

</html>
