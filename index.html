<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin & Win India PRO</title>

<style>

body{
font-family:Arial;
background:#0d0d0d;
color:white;
text-align:center;
margin:0;
}

header{
background:#111;
padding:20px;
}

h1{
color:#ffd700;
}

.container{
margin-top:30px;
}

#wheel{
width:280px;
height:280px;
border-radius:50%;
border:10px solid white;
margin:auto;
background:conic-gradient(
#ff5722 0deg 60deg,
#4caf50 60deg 120deg,
#2196f3 120deg 180deg,
#ffeb3b 180deg 240deg,
#9c27b0 240deg 300deg,
#00bcd4 300deg 360deg
);
transition:transform 4s ease-out;
box-shadow:0 0 30px #ff9800;
}

.pointer{
font-size:35px;
}

button{
padding:12px 25px;
font-size:18px;
background:#ff9800;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
margin:10px;
}

button:hover{
background:#ff5722;
}

.coins{
font-size:22px;
margin-top:10px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.popup-content{
background:#222;
padding:30px;
border-radius:10px;
}

.menu{
margin-top:30px;
}

.login{
margin-top:80px;
}

input{
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

</style>
</head>

<body>

<header>
<h1>Spin & Win India 🇮🇳 PRO</h1>
</header>

<!-- LOGIN -->

<div id="login" class="login">

<h2>Login</h2>

<input id="username" placeholder="Enter username">

<br>

<button onclick="login()">Start Playing</button>

</div>

<!-- GAME -->

<div id="game" style="display:none;">

<div class="coins">
Coins: <span id="coins">0</span>
</div>

<div class="container">

<div class="pointer">🔻</div>

<div id="wheel"></div>

<button onclick="spin()">SPIN (10 coins)</button>

</div>

<div class="menu">

<button onclick="dailyBonus()">🎁 Daily Bonus</button>

<button onclick="scratchCard()">🎫 Scratch Card</button>

<button onclick="luckyNumber()">🔢 Lucky Number</button>

<button onclick="leaderboard()">🏆 Leaderboard</button>

</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-content">

<h2 id="result"></h2>

<button onclick="closePopup()">OK</button>

</div>

</div>

<script>

let wheel=document.getElementById("wheel")

let rewards=[5,10,20,0,15,50]

let coins=0

let username=""

function login(){

username=document.getElementById("username").value

if(username==""){

alert("Enter username")

return

}

document.getElementById("login").style.display="none"

document.getElementById("game").style.display="block"

coins=parseInt(localStorage.getItem(username+"_coins"))||100

updateCoins()

}

function spin(){

if(coins<10){

alert("Not enough coins!")

return

}

coins-=10

updateCoins()

let rand=Math.floor(Math.random()*rewards.length)

let deg=720+rand*60

wheel.style.transform="rotate("+deg+"deg)"

setTimeout(()=>{

let reward=rewards[rand]

coins+=reward

updateCoins()

showPopup("🎉 You won "+reward+" coins!")

},4000)

}

function updateCoins(){

document.getElementById("coins").innerText=coins

localStorage.setItem(username+"_coins",coins)

}

function showPopup(text){

document.getElementById("result").innerText=text

document.getElementById("popup").style.display="flex"

}

function closePopup(){

document.getElementById("popup").style.display="none"

}

function dailyBonus(){

let today=new Date().toDateString()

let last=localStorage.getItem(username+"_daily")

if(last==today){

alert("Bonus already claimed")

return

}

coins+=20

updateCoins()

localStorage.setItem(username+"_daily",today)

alert("Daily bonus: 20 coins")

}

function scratchCard(){

let reward=Math.floor(Math.random()*40)

coins+=reward

updateCoins()

showPopup("Scratch card won "+reward+" coins!")

}

function luckyNumber(){

let guess=prompt("Guess number 1-5")

let num=Math.floor(Math.random()*5)+1

if(guess==num){

coins+=100

showPopup("🎉 Correct! You won 100 coins!")

}else{

showPopup("Wrong! Number was "+num)

}

updateCoins()

}

function leaderboard(){

alert("Leaderboard coming soon")

}

</script>

</body>
</html>
