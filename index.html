<!DOCTYPE html>
<html>
<head>
<title>Spin Win India</title>
<link rel="stylesheet" href="Style.css">
</head>

<body>

<!-- 🔝 HEADER -->
<div class="header">
<img src="Swilogo.png" class="logo">

<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- 💰 BALANCE -->
<div class="balance-bar">
<div class="coins-box">🪙 Coins: <span id="coins">0</span></div>
<div class="wallet-box">₹ <span id="wallet">0</span></div>
</div>

<!-- 🔻 POINTER -->
<div class="pointer">🔻</div>

<!-- 🎡 WHEEL -->
<canvas id="wheel"></canvas>

<!-- 🎯 SPIN -->
<button class="spin-btn" onclick="spin()">🎯 SPIN</button>

<!-- 🎁 DAILY BONUS -->
<button class="bonus-btn" onclick="dailyBonus()">
🎁 Claim Daily Bonus
</button>

<!-- 📺 AD -->
<button class="ad-btn" onclick="watchAdCoins()">
📺 Claim 20 Coins (Watch Ad)
</button>

<!-- 💸 WITHDRAW -->
<a href="withdraw.html">
<button class="withdraw-btn">💸 Withdraw</button>
</a>

<!-- 📺 BANNER -->
<div class="banner">
⬅ Your Ad Banner Here ➡
</div>

<script type="module" src="Script.js"></script>

</body>
</html>
