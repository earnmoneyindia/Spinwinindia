<!DOCTYPE html>
<html>
<head>
<title>Spin & Win India 🇮🇳</title>
<link rel="stylesheet" href="Style.css">
</head>

<body>

<button class="logout" onclick="logout()">Logout</button>

<header>
<img src="logo.png" class="logo">
<h1>Spin & Win India 🇮🇳</h1>
<p>Spin & Earn Coins</p>
</header>

<div class="container">

<div class="pointer">▼</div>

<div id="wheel"></div>

<!-- SPIN -->
<button id="spinBtn" onclick="spin()">SPIN (10 Coins)</button>

<button onclick="dailyBonus()">Daily Bonus 🎁</button>

<!-- EARN -->
<h2>Earn Coins 💰</h2>

<button onclick="watchAd()">Watch Ad (+5)</button>
<button onclick="checkIn()">Daily Check-in (+10)</button>
<button onclick="refer()">Refer Friend (+50)</button>

<!-- WITHDRAW -->
<h2>Withdraw 💸</h2>

<input type="text" id="upi" placeholder="Enter UPI ID">
<br><br>
<button onclick="withdraw()">Withdraw ₹</button>

<!-- COINS -->
<div class="coins">
Coins: <span id="coins">0</span> |
Wallet: ₹<span id="wallet">0</span>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-content">
<h2 id="resultText"></h2>
</div>
</div>

<script type="module" src="Script.js"></script>

</body>
</html>
