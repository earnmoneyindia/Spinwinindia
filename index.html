<!DOCTYPE html>
<html>
<head>
<title>Spin Win India</title>
<link rel="stylesheet" href="Style.css">
</head>

<body>

<div class="app">

<!-- 🔝 HEADER -->
<div class="header">
<img src="Swilogo.png" class="logo">
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- 💰 BALANCE -->
<div class="balance-bar">
<div class="coins-box">🪙 <span id="coins">0</span></div>
<div class="wallet-box">₹ <span id="wallet">0</span></div>
</div>

<!-- 🔻 POINTER -->
<div class="pointer">🔻</div>

<!-- 🎡 WHEEL -->
<canvas id="wheel"></canvas>

<!-- 🎯 SPIN -->
<button class="spin-btn" onclick="spin()">🎯 Spin</button>

<!-- 🎁 BONUS -->
<button class="bonus-btn" onclick="dailyBonus()">🎁 Daily Bonus</button>

<!-- 📺 AD -->
<button class="ad-btn" onclick="watchAdCoins()">📺 Watch Ad</button>

<!-- 💸 WITHDRAW -->
<a href="withdraw.html">
<button class="withdraw-btn">💸 Withdraw</button>
</a>

</div>

<!-- 📺 BOTTOM BANNER -->
<div class="banner">
📢 Ad Banner Space
</div>

<script type="module" src="Script.js"></script>

</body>
</html>
